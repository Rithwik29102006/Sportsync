<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportsSync - Connect & Play</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Phosphor Icons for premium iconography -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <!-- App Container -->
    <div id="app">
      <!-- Navbar Component will be injected here -->
      <nav id="navbar-container"></nav>
      
      <!-- Main Content Area where pages are loaded -->
      <main id="main-content" class="page-transition">
        <div style="display: flex; justify-content: center; align-items: center; min-height: 60vh; font-family: system-ui;">
          <div style="text-align: center;">
            <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem;"></div>
            <p style="color: #666;">Loading SportsSync...</p>
          </div>
        </div>
        <style>
          @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
          }
        </style>
      </main>
      
      <!-- Global Notification Overlay -->
      <div id="notification-container"></div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
